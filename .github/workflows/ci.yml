name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing

      - name: Validate SQL files are parseable
        run: |
          python -c "
          import duckdb, glob
          con = duckdb.connect()
          for f in glob.glob('analysis/*.sql'):
              try:
                  con.execute(open(f).read())
              except Exception as e:
                  print(f'WARN: {f}: {e}')
          print('SQL validation complete')
          "